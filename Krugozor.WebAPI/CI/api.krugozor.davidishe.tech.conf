server {
                server_name api.krugozor.space;
    		client_max_body_size 3M;
    		location / {
                        proxy_pass https://localhost:6070;
                        }


    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.krugozor.davidishe.pro/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.krugozor.davidishe.pro/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {

                listen 80;
                server_name api.krugozor.space;
}


server {
    if ($host = api.krugozor.space) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


                server_name api.krugozor.space;
    listen 80;
    return 404; # managed by Certbot


}